<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flux | Online video meeting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-zinc-900 text-white font-sans h-screen flex flex-col overflow-hidden">

    <!-- Entry Screen -->
    <div id="entry-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-zinc-950 px-4">
        <div class="max-w-md w-full bg-zinc-900 p-8 rounded-2xl border border-zinc-800 shadow-2xl">
            <div class="flex flex-col items-center mb-10">
                <h1 class="text-5xl font-black tracking-tight text-center bg-gradient-to-br from-white to-zinc-500 bg-clip-text text-transparent">Flux</h1>
                <p class="text-zinc-500 text-sm mt-2">Online video meeting</p>
            </div>
            
            <div class="space-y-6">
                <div>
                    <label class="block text-xs font-semibold text-zinc-500 uppercase mb-2 ml-1">Display Name</label>
                    <input type="text" id="user-name" placeholder="User" 
                        class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                </div>

                <div class="pt-4 border-t border-zinc-800">
                    <button id="btn-create" class="w-full py-3 bg-blue-600 hover:bg-blue-700 rounded-xl font-semibold mb-3 transition-all active:scale-95">
                        Create New Meeting
                    </button>
                    
                    <div class="relative flex items-center py-4">
                        <div class="flex-grow border-t border-zinc-800"></div>
                        <span class="flex-shrink mx-4 text-zinc-600 text-[10px] uppercase tracking-[0.2em] font-black">or</span>
                        <div class="flex-grow border-t border-zinc-800"></div>
                    </div>

                    <div class="flex gap-2">
                        <input type="text" id="join-id" maxlength="6" placeholder="6-digit code" 
                            class="flex-1 bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-center font-mono uppercase tracking-widest focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                        <button id="btn-join" disabled class="px-6 rounded-xl font-semibold transition-all">
                            Join
                        </button>
                    </div>
                </div>
            </div>
            <div id="error-container" class="mt-4 p-3 bg-red-500/10 border border-red-500/20 rounded-xl hidden">
                <p id="error-msg" class="text-red-400 text-sm text-center font-medium"></p>
            </div>
        </div>
    </div>

    <!-- Main Call Layout -->
    <main class="flex-1 flex p-4 gap-4 overflow-hidden hidden" id="call-interface">
        <div class="flex-1 flex flex-col gap-4">
            <div class="flex-1 grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Local -->
                <div class="relative bg-zinc-800 rounded-2xl overflow-hidden border border-zinc-700">
                    <video id="local-video" class="w-full h-full object-cover mirror" autoplay muted playsinline></video>
                    <div class="absolute bottom-4 left-4 bg-black/60 px-3 py-1.5 rounded-lg text-sm flex items-center gap-3 backdrop-blur-md border border-white/10">
                        <span id="local-display-name">You</span>
                        <div class="flex gap-1.5 border-l border-white/20 pl-2">
                            <i id="status-mic-local" data-lucide="mic" class="w-3.5 h-3.5 text-white"></i>
                            <i id="status-vid-local" data-lucide="video" class="w-3.5 h-3.5 text-white"></i>
                        </div>
                    </div>
                </div>

                <!-- Remote -->
                <div class="relative bg-zinc-800 rounded-2xl overflow-hidden border border-zinc-700">
                    <video id="remote-video" class="w-full h-full object-cover" autoplay playsinline></video>
                    <div class="absolute bottom-4 left-4 bg-black/60 px-3 py-1.5 rounded-lg text-sm flex items-center gap-3 backdrop-blur-md border border-white/10" id="remote-label">
                        <span id="remote-display-name">Waiting...</span>
                        <div class="flex gap-1.5 border-l border-white/20 pl-2">
                            <i id="status-mic-remote" data-lucide="mic" class="w-3.5 h-3.5 text-white"></i>
                            <i id="status-vid-remote" data-lucide="video" class="w-3.5 h-3.5 text-white"></i>
                        </div>
                    </div>
                    <div id="waiting-overlay" class="absolute inset-0 flex flex-col items-center justify-center bg-zinc-900">
                        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-500"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Sidebar -->
        <aside id="chat-sidebar" class="w-80 flex flex-col gap-4">
            <!-- Meeting ID at top -->
            <div class="bg-zinc-800 rounded-2xl border border-zinc-700 p-4 shadow-xl">
                <label class="text-[10px] uppercase tracking-widest text-zinc-500 font-bold mb-1 block">Meeting ID</label>
                <div id="display-code" class="text-2xl font-mono font-black text-blue-400 tracking-tighter">------</div>
            </div>

            <!-- Chat below -->
            <div class="flex-1 bg-zinc-800 rounded-2xl border border-zinc-700 flex flex-col shadow-xl overflow-hidden">
                <div class="p-4 border-b border-zinc-700">
                    <h2 class="font-bold flex items-center gap-2"><i data-lucide="message-square" class="w-4 h-4 text-blue-500"></i> Chat</h2>
                </div>
                <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
                <div class="p-4 bg-zinc-900/50">
                    <form id="chat-form" class="flex gap-2">
                        <input type="text" id="chat-input" placeholder="Message..." class="flex-1 bg-zinc-800 border border-zinc-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500">
                        <button type="submit" class="bg-blue-600 p-2 rounded-lg hover:bg-blue-700 transition-colors"><i data-lucide="send" class="w-4 h-4"></i></button>
                    </form>
                </div>
            </div>
        </aside>
    </main>

    <footer class="h-20 bg-zinc-950 border-t border-zinc-800 flex items-center justify-center px-6 hidden" id="controls-bar">
        <div class="flex items-center gap-4">
            <button id="toggle-mic" class="control-btn"><i data-lucide="mic"></i></button>
            <button id="toggle-video" class="control-btn"><i data-lucide="video"></i></button>
            <div class="w-px h-6 bg-zinc-800 mx-2"></div>
            <button id="btn-hangup" class="control-btn bg-red-500/10 text-red-500 border-red-500/20 hover:bg-red-500 transition-colors"><i data-lucide="phone-off"></i></button>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
