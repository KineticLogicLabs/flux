<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Video Call</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-zinc-900 text-white font-sans h-screen flex flex-col overflow-hidden">

    <!-- Entry Screen -->
    <div id="entry-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-zinc-950 px-4">
        <div class="max-w-md w-full bg-zinc-900 p-8 rounded-2xl border border-zinc-800 shadow-2xl">
            <h1 class="text-3xl font-bold mb-2 text-center">Video Call</h1>
            <p class="text-zinc-400 text-center mb-8 text-sm">Join or start a private P2P meeting</p>
            
            <div class="space-y-4">
                <button id="btn-create" class="w-full py-3 bg-blue-600 hover:bg-blue-700 rounded-xl font-semibold transition-all">
                    Create New Meeting
                </button>
                
                <div class="relative flex items-center py-2">
                    <div class="flex-grow border-t border-zinc-800"></div>
                    <span class="flex-shrink mx-4 text-zinc-500 text-xs uppercase tracking-widest">or</span>
                    <div class="flex-grow border-t border-zinc-800"></div>
                </div>

                <div class="flex gap-2">
                    <input type="text" id="join-id" placeholder="6-digit code" 
                        class="flex-1 bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 text-center tracking-widest uppercase font-mono">
                    <button id="btn-join" class="px-6 bg-zinc-100 text-zinc-900 hover:bg-white rounded-xl font-semibold transition-all">
                        Join
                    </button>
                </div>
            </div>
            <p id="error-msg" class="text-red-400 text-sm mt-4 text-center hidden">Invalid code or peer not found.</p>
        </div>
    </div>

    <!-- Call Interface -->
    <main class="flex-1 relative flex flex-col md:flex-row p-4 gap-4 overflow-hidden hidden" id="call-interface">
        
        <!-- Video Grid -->
        <div class="flex-1 grid grid-cols-1 md:grid-cols-2 gap-4 h-full">
            <!-- Local Video Container -->
            <div class="relative bg-zinc-800 rounded-2xl overflow-hidden border border-zinc-700 shadow-lg group">
                <video id="local-video" class="w-full h-full object-cover mirror" autoplay muted playsinline></video>
                <div class="absolute bottom-4 left-4 bg-black/50 px-3 py-1 rounded-lg text-sm backdrop-blur-md">
                    You
                </div>
                <div id="local-muted-overlay" class="absolute inset-0 flex items-center justify-center bg-zinc-900 hidden">
                    <div class="w-20 h-20 rounded-full bg-zinc-800 flex items-center justify-center text-zinc-600">
                        <i data-lucide="user" class="w-10 h-10"></i>
                    </div>
                </div>
            </div>

            <!-- Remote Video Container -->
            <div class="relative bg-zinc-800 rounded-2xl overflow-hidden border border-zinc-700 shadow-lg group">
                <video id="remote-video" class="w-full h-full object-cover" autoplay playsinline></video>
                <div class="absolute bottom-4 left-4 bg-black/50 px-3 py-1 rounded-lg text-sm backdrop-blur-md" id="remote-name">
                    Waiting for peer...
                </div>
                <div id="waiting-overlay" class="absolute inset-0 flex flex-col items-center justify-center bg-zinc-900">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500 mb-4"></div>
                    <p class="text-zinc-400 animate-pulse">Waiting for connection...</p>
                </div>
            </div>
        </div>

        <!-- Meeting Info Sidebar (Desktop) -->
        <div class="w-full md:w-64 bg-zinc-800/50 rounded-2xl p-6 border border-zinc-700 backdrop-blur-sm flex flex-col">
            <h2 class="text-sm font-semibold text-zinc-500 uppercase tracking-wider mb-4">Meeting Details</h2>
            <div class="bg-zinc-900 rounded-xl p-4 border border-zinc-700 mb-6">
                <p class="text-xs text-zinc-500 mb-1">Meeting Code</p>
                <p id="display-code" class="text-2xl font-mono font-bold tracking-widest text-blue-400">------</p>
            </div>
            <div class="flex-1">
                <p class="text-xs text-zinc-400 italic">This is a direct peer-to-peer call. No data is stored on any server.</p>
            </div>
        </div>
    </main>

    <!-- Controls Bar -->
    <footer class="h-24 bg-zinc-950 border-t border-zinc-800 flex items-center justify-center px-6 hidden" id="controls-bar">
        <div class="flex items-center gap-4">
            <button id="toggle-mic" class="control-btn" title="Toggle Microphone">
                <i data-lucide="mic"></i>
            </button>
            <button id="toggle-video" class="control-btn" title="Toggle Camera">
                <i data-lucide="video"></i>
            </button>
            <div class="w-px h-8 bg-zinc-800 mx-2"></div>
            <button id="btn-hangup" class="control-btn bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white border-red-500/20" title="End Call">
                <i data-lucide="phone-off"></i>
            </button>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
